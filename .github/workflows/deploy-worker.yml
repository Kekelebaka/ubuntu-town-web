name: Deploy Outbox Worker

on:
  push:
    branches: [main]
    paths:
      - 'workers/publish-outbox/**'

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: workers/publish-outbox
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm install --no-audit --no-fund --silent 2>/dev/null || npm install

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: npm
          command: deploy
          workingDirectory: workers/publish-outbox
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
