<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#6B1F66">
<title>Offline — Ubuntu Town OS</title>
<style>
  body{margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:#FBF7F2;color:#1F1329;font-family:system-ui,-apple-system,sans-serif;text-align:center;padding:24px;}
  img{width:110px;height:auto;margin-bottom:22px;}
  h1{font-size:1.5rem;margin:0 0 8px;}
  p{color:#6E6560;max-width:34ch;margin:0 0 6px;}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:#F79412;margin-right:7px;}
  .card{background:#fff;border:1px solid #E7DFD2;border-radius:16px;padding:28px 26px;box-shadow:0 10px 30px rgba(31,19,41,.08);}
</style>
</head>
<body>
  <div class="card">
    <img src="icons/icon-192.png" alt="Ubuntu Town OS">
    <h1>You're offline</h1>
    <p><span class="dot"></span>Ubuntu Town OS keeps working. Anything you capture is saved on your phone and syncs automatically when you're back on.</p>
    <p style="margin-top:14px;font-size:13px;">Signals become workpacks. Workpacks become proof. Proof becomes memory.</p>
  </div>
</body>
</html>
